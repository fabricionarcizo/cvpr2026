services:
  gn-qairt-toolchain:
    container_name: gn-qairt-toolchain
    hostname: gn-qairt-toolchain
    image: gn-qairt-toolchain
    build:
      dockerfile: Dockerfile
    init: false
    restart: unless-stopped
    ports:
      - "8888:8888"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./models:/workspace/models
      - ./notebooks:/workspace/notebooks
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - TZ=Europe/Copenhagen
      - PYTHONUNBUFFERED=1
    working_dir: /workspace/notebooks
    command: >
      jupyter lab --ip=0.0.0.0 --allow-root --IdentityProvider.token=''
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
